<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="game-container">

    <h1 class="title">MOH'S SNAKE GAME</h1>

    <!-- SCORE SECTION -->
    <div class="score-section">
      <div class="speed-wrapper">
        <select id="speedSelect">
          <option value="200">Slow</option>
          <option value="130" selected>Normal</option>
          <option value="80">Fast</option>
          <option value="50">Insane</option>
        </select>
      </div>
      <div class="score-box">
        <span class="score-label">SCORE</span>
        <span class="score-value" id="scoreText">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">BEST</span>
        <span class="score-value" id="bestText">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">SPEED</span>
        <span class="score-value" id="speedText">1x</span>
      </div>
      <button id="muteBtn">🔊</button>
    </div>

    <!-- GAME BOARD -->
    <div class="board-wrapper">
      <canvas id="gameBoard" width="400" height="400"></canvas>
      <div id="overlay">
        <p id="overlayTitle">SNAKE</p>
        <small id="overlaySub">Press Start or Space to play</small>
      </div>
    </div>

    <!-- Desktop: Start + Pause only (no dpad) -->
    <div class="game-controls">
      <button id="startBtn">Start</button>
      <!-- Up arrow: only visible on mobile -->
      <button class="dpad-btn dpad-only" id="dUp">&#8593;</button>
      <button id="pauseBtn" disabled>Pause</button>
    </div>

    <!-- D-pad rows: only visible on mobile -->
    <div class="dpad-row dpad-only">
      <button class="dpad-btn" id="dLeft">&#8592;</button>
      <button class="dpad-btn" id="dDown">&#8595;</button>
      <button class="dpad-btn" id="dRight">&#8594;</button>
    </div>

    <p class="creator">Developed by Mohammed Shittu Yusuf</p>

  </div>

  <script src="index.js"></script>
</body>
</html>
